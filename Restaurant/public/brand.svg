<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 140" width="500" height="140">
  <defs>
    <linearGradient id="forkGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C0A060;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6914;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A1A2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="moonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D5A3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0A060;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle (optional accent) -->
  <circle cx="70" cy="70" r="60" fill="#1A1A2E" opacity="0.05"/>

  <!-- Fork tines - left -->
  <g transform="translate(70, 70)">
    <!-- Left tine -->
    <path d="M-8,-45 L-8,-10 Q-8,-2 -4,-2 L-2,-2 Q0,-2 0,-8 L0,-45" fill="url(#forkGradient)"/>
    <!-- Right tine -->
    <path d="M8,-45 L8,-10 Q8,-2 4,-2 L2,-2 Q0,-2 0,-8 L0,-45" fill="url(#forkGradient)"/>
    <!-- Middle tine -->
    <path d="M-2,-50 L-2,-8 Q-2,-1 0,-1 L2,-1 Q4,-1 4,-8 L4,-50" fill="url(#forkGradient)"/>
    <!-- Handle -->
    <path d="M-3,-1 L-3,35 Q-3,40 0,42 L3,42 Q6,40 6,35 L6,-1 Z" fill="url(#forkGradient)"/>
    <!-- Handle bottom curve -->
    <path d="M-3,38 Q-3,44 0,46 L3,46 Q6,44 6,38" fill="url(#forkGradient)"/>
  </g>

  <!-- Moon/Crescent symbol (midnight theme) -->
  <g transform="translate(70, 70)">
    <circle cx="12" cy="-12" r="8" fill="url(#moonGradient)" opacity="0.9"/>
    <circle cx="16" cy="-14" r="6" fill="#FFFFFF" opacity="0.85"/>
  </g>

  <!-- Small stars around the moon -->
  <circle cx="88" cy="48" r="1.5" fill="#C0A060" opacity="0.7"/>
  <circle cx="95" cy="55" r="1" fill="#C0A060" opacity="0.5"/>
  <circle cx="50" cy="45" r="1.2" fill="#C0A060" opacity="0.6"/>

  <!-- Brand Name - MIDNIGHT -->
  <text x="140" y="58" font-family="'Georgia', 'Times New Roman', serif" font-size="36" font-weight="bold" fill="url(#textGradient)" letter-spacing="8">
    MIDNIGHT
  </text>

  <!-- Brand Name - FORK -->
  <text x="140" y="98" font-family="'Georgia', 'Times New Roman', serif" font-size="36" font-weight="bold" fill="url(#textGradient)" letter-spacing="12">
    FORK
  </text>

  <!-- Subtitle -->
  <text x="140" y="118" font-family="'Arial', sans-serif" font-size="11" fill="#C0A060" letter-spacing="6" font-weight="600">
    FINE DINING &amp; HOSPITALITY
  </text>

  <!-- Decorative line under subtitle -->
  <line x1="140" y1="124" x2="310" y2="124" stroke="url(#forkGradient)" stroke-width="1.5" opacity="0.6"/>

  <!-- Small diamond separator -->
  <polygon points="325,121 328,124 325,127 322,124" fill="#C0A060" opacity="0.8"/>

</svg>